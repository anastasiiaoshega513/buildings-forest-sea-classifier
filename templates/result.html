<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prediction Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <main class="page">
        <section class="card result-card">
            <div class="badge">Prediction Result</div>

            <h1>{{ label }}</h1>

            <p class="subtitle">
                Confidence: <strong>{{ probability }}%</strong>
            </p>

            <img
                src="{{ url_for('static', filename=image_path) }}"
                alt="Uploaded image"
                class="preview-image"
            >

            <a href="/" class="back-link">Try another image</a>
        </section>
    </main>
</body>
</html>
